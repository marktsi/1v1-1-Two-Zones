<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1v1 +1 with Two Zones</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a; font-family: 'Barlow', sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px; color: #fff;
  }

  .header { text-align: center; margin-bottom: 14px; }
  .header h1 {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 24px;
    letter-spacing: 2px; text-transform: uppercase; color: #C61D23;
  }
  .header p { font-size: 11px; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

  .phase-label {
    font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; color: #fff; background: #C61D23;
    padding: 4px 16px; margin-bottom: 12px; min-width: 460px; text-align: center;
  }

  .scene { position: relative; width: 640px; height: 440px; }

  .field {
    position: absolute; top: 50px; left: 50px; width: 540px; height: 340px;
    background: #1a5c1a; border: 2px solid rgba(255,255,255,0.7); border-radius: 2px;
  }
  .field::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(90deg, transparent, transparent 54px,
      rgba(255,255,255,0.04) 54px, rgba(255,255,255,0.04) 108px);
  }
  .centre-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.55); }
  .centre-circle {
    position: absolute; top: 50%; left: 50%; width: 70px; height: 70px;
    border: 1px solid rgba(255,255,255,0.35); border-radius: 50%; transform: translate(-50%,-50%);
  }
  .centre-dot {
    position: absolute; top: 50%; left: 50%; width: 5px; height: 5px;
    background: rgba(255,255,255,0.45); border-radius: 50%; transform: translate(-50%,-50%);
  }

  /* Four small endline goals — 2 on left endline, 2 on right endline */
  .goal {
    position: absolute;
    width: 10px; height: 44px;
    border: 2px solid rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.07);
    transform: translateY(-50%);
  }
  .goal.left  { left:  -10px; border-right: none; }
  .goal.right { right: -10px; border-left:  none; }
  .goal.top    { top: 25%; }
  .goal.bot    { top: 75%; }

  /* Zone labels */
  .zone-label {
    position: absolute;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    color: rgba(255,255,255,0.3); text-transform: uppercase;
    top: 8px;
  }
  .zone-label.left  { left: 22%; }
  .zone-label.right { right: 22%; }

  /* ── Players ── */
  .player {
    position: absolute; width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; color: #fff;
    border: 2px solid rgba(255,255,255,0.3);
    transition: left 0.85s cubic-bezier(0.4,0,0.2,1), top 0.85s cubic-bezier(0.4,0,0.2,1);
    z-index: 10;
  }
  .player.red    { background: #C61D23; box-shadow: 0 0 8px rgba(198,29,35,0.5); }
  .player.blue   { background: #1a6eb5; box-shadow: 0 0 8px rgba(26,110,181,0.5); }
  .player.yellow { background: #f4d03f; box-shadow: 0 0 8px rgba(244,208,63,0.6); color: #000; }

  .player.pulse { animation: pulse 0.45s ease-in-out 4; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.6)} }

  /* Ball */
  .ball {
    position: absolute; width: 13px; height: 13px; border-radius: 50%;
    background: #fff; border: 1px solid #bbb; z-index: 20;
    transition: left 0.85s cubic-bezier(0.4,0,0.2,1), top 0.85s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 8px rgba(255,255,255,0.9);
  }

  /* Goal flash */
  .goal-flash {
    position: absolute; top: 50px; left: 50px; width: 540px; height: 340px;
    background: rgba(198,29,35,0.12); border: 2px solid #C61D23;
    pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 5; border-radius: 2px;
  }
  .goal-flash.show { opacity: 1; }
  .goal-flash.blue { background: rgba(26,110,181,0.14); border-color: #1a6eb5; }

  .goal-text {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-family: 'Barlow Condensed', sans-serif; font-size: 48px; font-weight: 900;
    color: #C61D23; letter-spacing: 4px; text-transform: uppercase;
    opacity: 0; transition: opacity 0.3s; z-index: 30;
    text-shadow: 0 0 24px rgba(198,29,35,0.9); pointer-events: none; white-space: nowrap;
  }
  .goal-text.show { opacity: 1; }
  .goal-text.blue { color: #1a6eb5; text-shadow: 0 0 24px rgba(26,110,181,0.9); }

  .arrows-svg {
    position: absolute; top: 0; left: 0; width: 640px; height: 440px;
    pointer-events: none; z-index: 15; opacity: 0; transition: opacity 0.4s;
  }
  .arrows-svg.show { opacity: 1; }

  .legend { display: flex; gap: 18px; margin-top: 12px; justify-content: center; flex-wrap: wrap; max-width: 640px; }
  .legend-item {
    display: flex; align-items: center; gap: 6px; font-size: 11px; color: #bbb;
    font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px; text-transform: uppercase;
  }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  .legend-dot.red    { background: #C61D23; }
  .legend-dot.blue   { background: #1a6eb5; }
  .legend-dot.yellow { background: #f4d03f; }

  .step-indicators { display: flex; gap: 7px; margin-top: 10px; flex-wrap: wrap; justify-content: center; max-width: 540px; }
  .step-dot { width: 7px; height: 7px; border-radius: 50%; background: #333; transition: background 0.3s; }
  .step-dot.active { background: #C61D23; }
  .step-dot.done   { background: #555; }

  .desc {
    font-size: 12px; color: #888; text-align: center; max-width: 540px;
    margin-top: 6px; line-height: 1.5; min-height: 36px;
  }

  .controls { display: flex; gap: 8px; margin-top: 12px; align-items: center; }
  .btn {
    font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 18px;
    border: none; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary            { background: #C61D23; color: #fff; }
  .btn-primary:hover      { background: #e02228; }
  .btn-secondary          { background: transparent; color: #888; border: 1px solid #333; }
  .btn-secondary:hover    { border-color: #666; color: #ccc; }

  .tsi-logo-wrap{display:flex;justify-content:center;padding:0 0 12px;width:100%;}
  .tsi-logo{height:38px;width:auto;display:block;}
</style>
</head>

<div class="header">
  <h1>1v1 +1 with Two Zones</h1>
  <p>Small Sided Game</p>
</div>

<div class="phase-label" id="phaseLabel">Phase 1 — Set Up</div>

<div class="scene">
  <div class="field">
    <div class="centre-line"></div>
    <div class="centre-circle"></div>
    <div class="centre-dot"></div>

    <div class="zone-label left">Left Zone</div>
    <div class="zone-label right">Right Zone</div>

    <div class="goal left top"></div>
    <div class="goal left bot"></div>
    <div class="goal right top"></div>
    <div class="goal right bot"></div>
  </div>

  <div class="goal-flash" id="goalFlash"></div>
  <div class="goal-text"  id="goalText">GOAL!</div>

  <svg class="arrows-svg" id="svgPass" viewBox="0 0 640 440">
    <defs>
      <marker id="mPass" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
        <path d="M0,0 L7,3.5 L0,7 Z" fill="#ffffff"/>
      </marker>
    </defs>
    <path id="passArrow" stroke="#ffffff" stroke-width="2.2" fill="none" marker-end="url(#mPass)" opacity="0.9"/>
  </svg>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot red"></div>Red — attacks when in possession</div>
  <div class="legend-item"><div class="legend-dot blue"></div>Blue — attacks when in possession</div>
  <div class="legend-item"><div class="legend-dot yellow"></div>Yellow — zone-locked joker (+1)</div>
</div>

<div class="step-indicators" id="stepDots"></div>
<div class="desc" id="desc"></div>

<div class="controls">
  <button class="btn btn-secondary" id="prevBtn" onclick="changePhase(-1)">← Back</button>
  <button class="btn btn-primary"   id="playBtn" onclick="toggleAuto()">▶ Auto</button>
  <button class="btn btn-secondary" id="nextBtn" onclick="changePhase(1)">Next →</button>
</div>

<script>
// ── Geometry ─────────────────────────────────────────────────────────
const FL=50, FT=50, FW=540, FH=340;
function p(px,py){ return [ FL + px/100*FW - 12, FT + py/100*FH - 12 ]; }
function b(px,py){ return [ FL + px/100*FW - 6.5, FT + py/100*FH - 6.5 ]; }
function ctr(pos){ return [ pos[0]+12, pos[1]+12 ]; }
function ballCtr(pos){ return [ pos[0]+6.5, pos[1]+6.5 ]; }

// Players: [R1, R2, B1, B2, Y1, Y2]
// R1, B1, Y1 = right zone players
// R2, B2, Y2 = left zone players

// ── SEQUENCE A: Red attacks (right zone start → left zone finish, scores left goal) ──
// Positions tracked per phase. Each phase has full snapshot.

const ph1 = {
  R1: p(70, 45), R2: p(30, 55),
  B1: p(58, 50), B2: p(40, 45),
  Y1: p(80, 70), Y2: p(20, 70),
  ball: b(70, 45), pass: null, goal: null
};

// Ph2: R1 has ball. B1 steps to press. Y1 stays in starting position — already in a clean lane.
const ph2 = {
  R1: p(70, 45), R2: p(30, 55),
  B1: p(63, 47),                        // press R1
  B2: p(40, 45),
  Y1: p(80, 70),                        // hold starting position
  Y2: p(20, 70),
  ball: b(70, 45), pass: null, goal: null
};

// Ph3: R1 → Y1 (Y1 holds starting position to receive)
const ph3 = {
  R1: p(70, 45), R2: p(30, 55),
  B1: p(66, 50),                        // keeps closing
  B2: p(40, 45),
  Y1: p(80, 70), Y2: p(20, 70),
  ball: ballCtr(p(80, 70)),
  pass: [ctr(p(70, 45)), ctr(p(80, 70))],
  goal: null
};

// Ph4: Y1 plays across to R2 (left zone). B2 steps goalside of R2.
const ph4 = {
  R1: p(70, 45), R2: p(30, 55),
  B1: p(72, 62),                        // tracks ball through right zone
  B2: p(22, 50),                        // goalside of R2 (between R2 and the left endline)
  Y1: p(80, 70), Y2: p(20, 70),
  ball: ballCtr(p(30, 55)),
  pass: [ctr(p(80, 70)), ctr(p(30, 55))],
  goal: null
};

// Ph5: R2 receives, B2 presses
const ph5 = {
  R1: p(70, 45), R2: p(30, 55),
  B1: p(72, 62),
  B2: p(25, 53),                        // press R2 from goalside angle
  Y1: p(80, 70), Y2: p(20, 70),
  ball: ballCtr(p(30, 55)),
  pass: null, goal: null
};

// Ph6: R2 → Y2
const ph6 = {
  R1: p(70, 45), R2: p(30, 55),
  B1: p(72, 62),
  B2: p(24, 60),                        // close in toward Y2's lane
  Y1: p(80, 70), Y2: p(20, 70),
  ball: ballCtr(p(20, 70)),
  pass: [ctr(p(30, 55)), ctr(p(20, 70))],
  goal: null
};

// Ph7: B2 presses Y2; R2 makes run LEFT toward the small goal he will score on.
const ph7 = {
  R1: p(70, 45),
  R2: p(8, 30),                         // run left toward the top-left goal
  B1: p(72, 62),
  B2: p(22, 68),                        // jumps to press Y2
  Y1: p(80, 70), Y2: p(20, 70),
  ball: ballCtr(p(8, 30)),
  pass: [ctr(p(20, 70)), ctr(p(8, 30))],
  goal: null
};

// Ph8: Red scores into the top-left goal
const ph8 = {
  R1: p(70, 45),
  R2: p(8, 30),                         // holds
  B1: p(72, 62),
  B2: p(22, 68),
  Y1: p(80, 70), Y2: p(20, 70),
  ball: b(-2, 25),
  pass: [ctr(p(8, 30)), ballCtr(b(-2, 25))],
  goal: 'red'
};

// ── SEQUENCE B: Blue mirror (left zone start → right zone finish, scores right goal) ──

// Ph9: Reset — B2 now has the ball in left zone
const ph9 = {
  R1: p(70, 50), R2: p(36, 55),
  B1: p(70, 55), B2: p(28, 45),
  Y1: p(80, 70), Y2: p(18, 70),
  ball: b(28, 45), pass: null, goal: null
};

// Ph10: B2 has ball. R2 presses. Y2 moves to passing lane.
const ph10 = {
  R1: p(70, 50), R2: p(35, 47),         // press
  B1: p(70, 55), B2: p(28, 45),
  Y1: p(80, 70), Y2: p(18, 70),         // into lane
  ball: b(28, 45), pass: null, goal: null
};

// Ph11: B2 → Y2
const ph11 = {
  R1: p(70, 50), R2: p(32, 50),         // keeps closing
  B1: p(70, 55), B2: p(28, 45),
  Y1: p(80, 70), Y2: p(18, 70),
  ball: ballCtr(p(18, 70)),
  pass: [ctr(p(28, 45)), ctr(p(18, 70))],
  goal: null
};

// Ph12: Y2 plays across to B1 (right zone). R1 holds position.
const ph12 = {
  R1: p(70, 50),                        // holds
  R2: p(28, 50),                        // tracks ball
  B1: p(70, 55), B2: p(28, 45),
  Y1: p(80, 70), Y2: p(18, 70),
  ball: ballCtr(p(70, 55)),
  pass: [ctr(p(18, 70)), ctr(p(70, 55))],
  goal: null
};

// Ph13: B1 receives, R1 closes from his goalside position to press
const ph13 = {
  R1: p(74, 52),                        // closes from goalside down onto B1
  R2: p(28, 50),
  B1: p(70, 55), B2: p(28, 45),
  Y1: p(80, 70), Y2: p(18, 70),
  ball: ballCtr(p(70, 55)),
  pass: null, goal: null
};

// Ph14: B1 → Y1. R1 holds the press position.
const ph14 = {
  R1: p(74, 52),                        // holds
  R2: p(28, 50),
  B1: p(70, 55), B2: p(28, 45),
  Y1: p(80, 70), Y2: p(18, 70),
  ball: ballCtr(p(80, 70)),
  pass: [ctr(p(70, 55)), ctr(p(80, 70))],
  goal: null
};

// Ph15: R1 presses Y1; B1 runs toward top-right goal; Y1 slides ball into B1's path
const ph15 = {
  R1: p(76, 68),                        // press Y1
  R2: p(28, 50),
  B1: p(88, 28),                        // run to top-right goal
  B2: p(28, 45),
  Y1: p(80, 70), Y2: p(18, 70),
  ball: ballCtr(p(88, 28)),
  pass: [ctr(p(80, 70)), ctr(p(88, 28))],
  goal: null
};

// Ph16: Blue scores into top-right goal
const ph16 = {
  R1: p(76, 68),
  R2: p(28, 50),
  B1: p(88, 28),                        // holds
  B2: p(28, 45),
  Y1: p(80, 70), Y2: p(18, 70),
  ball: b(102, 25),
  pass: [ctr(p(88, 28)), ballCtr(b(102, 25))],
  goal: 'blue'
};

const phases = [
  { label: "Phase 1 — Set Up",                                 desc: "1v1+1 in each zone. Red and Blue play attackers↔defenders depending on who has the ball; Yellow is the joker, locked to their zone and joins whichever team has the ball there. Four small goals — two on each endline. Red starts with the ball in the right zone.", state: ph1 },
  { label: "Phase 2 — R1 on the ball, B1 presses",             desc: "R1 has the ball in the right zone. B1 steps to press. Y1 (right-zone joker) drops into a clean passing lane.", state: ph2 },
  { label: "Phase 3 — R1 → Y1",                                desc: "R1 plays through B1's pressure into Y1, who receives in space.", state: ph3 },
  { label: "Phase 4 — Switch to the left zone",                desc: "Y1 plays the ball across to the left zone to free R2.", state: ph4 },
  { label: "Phase 5 — R2 receives under pressure",             desc: "R2 receives in the left zone. B2 immediately closes the ball.", state: ph5 },
  { label: "Phase 6 — R2 → Y2",                                desc: "R2 plays out of B2's pressure to Y2, the left-zone joker.", state: ph6 },
  { label: "Phase 7 — Y2 → R2 (timed run)",                    desc: "B2 jumps across to press Y2. At the same moment R2 makes a run toward the small goal. Y2 slips the ball into R2's path.", state: ph7 },
  { label: "Phase 8 — Red scores",                             desc: "R2 receives in stride and finishes into the bottom-left small goal.", state: ph8 },

  { label: "Phase 9 — Reset: Blue ball in left zone",          desc: "Reset to starting shape. This time B2 starts with the ball in the left zone.", state: ph9 },
  { label: "Phase 10 — B2 on the ball, R2 presses",            desc: "B2 has the ball in the left zone. R2 steps to press. Y2 drops into a clean passing lane.", state: ph10 },
  { label: "Phase 11 — B2 → Y2",                               desc: "B2 plays through R2's pressure into Y2, who receives in space.", state: ph11 },
  { label: "Phase 12 — Switch to the right zone",              desc: "Y2 plays the ball across to the right zone to free B1.", state: ph12 },
  { label: "Phase 13 — B1 receives under pressure",            desc: "B1 receives in the right zone. R1 immediately closes the ball.", state: ph13 },
  { label: "Phase 14 — B1 → Y1",                               desc: "B1 plays out of R1's pressure to Y1, the right-zone joker.", state: ph14 },
  { label: "Phase 15 — Y1 → B1 (timed run)",                   desc: "R1 jumps across to press Y1. At the same moment B1 makes a run toward the small goal. Y1 slips the ball into B1's path.", state: ph15 },
  { label: "Phase 16 — Blue scores",                           desc: "B1 receives in stride and finishes into the top-right small goal.", state: ph16 }
];

// ── DOM ──────────────────────────────────────────────────────────────
const scene = document.querySelector('.scene');
const els = { R1:null, R2:null, B1:null, B2:null, Y1:null, Y2:null, ball:null };

function mkPlayer(team, label){
  const el = document.createElement('div');
  el.className = `player ${team}`;
  el.textContent = label;
  scene.appendChild(el);
  return el;
}

function createAll(){
  els.R1 = mkPlayer('red',    1);
  els.R2 = mkPlayer('red',    2);
  els.B1 = mkPlayer('blue',   1);
  els.B2 = mkPlayer('blue',   2);
  els.Y1 = mkPlayer('yellow', 1);
  els.Y2 = mkPlayer('yellow', 2);
  const ball = document.createElement('div');
  ball.className = 'ball';
  scene.appendChild(ball);
  els.ball = ball;
}

let current=0, isAuto=false, timer=null;

function applyPhase(idx){
  const ph = phases[idx];
  const s  = ph.state;

  ['R1','R2','B1','B2','Y1','Y2'].forEach(k=>{
    els[k].style.left = s[k][0]+'px';
    els[k].style.top  = s[k][1]+'px';
  });

  els.ball.style.left = s.ball[0]+'px';
  els.ball.style.top  = s.ball[1]+'px';

  const flash = document.getElementById('goalFlash');
  const gtext = document.getElementById('goalText');
  const isGoal = !!s.goal;
  flash.classList.toggle('show', isGoal);
  gtext.classList.toggle('show', isGoal);
  flash.classList.toggle('blue', s.goal === 'blue');
  gtext.classList.toggle('blue', s.goal === 'blue');
  if(isGoal){
    const team = s.goal === 'blue' ? ['B1','B2'] : ['R1','R2'];
    team.forEach(k=>{ els[k].classList.add('pulse'); setTimeout(()=>els[k].classList.remove('pulse'),1800); });
  }

  const svg = document.getElementById('svgPass');
  const arrow = document.getElementById('passArrow');
  if(s.pass){
    arrow.setAttribute('d', `M${s.pass[0][0]},${s.pass[0][1]} L${s.pass[1][0]},${s.pass[1][1]}`);
    svg.classList.add('show');
  } else {
    svg.classList.remove('show');
  }

  document.getElementById('phaseLabel').textContent = ph.label;
  document.getElementById('desc').textContent = ph.desc;

  document.querySelectorAll('.step-dot').forEach((d,i)=>{
    d.classList.toggle('active', i===idx);
    d.classList.toggle('done',   i<idx);
  });
  document.getElementById('prevBtn').style.opacity = idx===0 ? '0.3':'1';
  document.getElementById('nextBtn').style.opacity = idx===phases.length-1 ? '0.3':'1';
}

function changePhase(dir){
  const next = Math.max(0, Math.min(phases.length-1, current+dir));
  if(next!==current){ current=next; applyPhase(current); }
  if(current===phases.length-1 && isAuto) stopAuto();
}

function toggleAuto(){
  if(isAuto){ stopAuto(); return; }
  isAuto=true;
  document.getElementById('playBtn').textContent='⏸ Pause';
  if(current===phases.length-1){ current=0; applyPhase(0); }
  timer=setInterval(()=>{
    if(current<phases.length-1){ current++; applyPhase(current); }
    else stopAuto();
  }, 2400);
}

function stopAuto(){
  isAuto=false; clearInterval(timer);
  document.getElementById('playBtn').textContent='▶ Auto';
}

phases.forEach(()=>{
  const d=document.createElement('div');
  d.className='step-dot';
  document.getElementById('stepDots').appendChild(d);
});

createAll();
applyPhase(0);
</script>
</body>
</html>
